<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Mnema · Walk · New-hire onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --canvas:        #0A0B0D;
  --surface:       #121317;
  --surface-2:     #181A1F;
  --surface-3:     #22252B;
  --sunken:        #050608;
  --line:          rgba(255,255,255,0.06);
  --line-strong:   rgba(255,255,255,0.12);
  --line-bright:   rgba(255,255,255,0.22);
  --ink:           #F4F5F7;
  --ink-soft:      #B0B4BC;
  --ink-muted:     #707479;
  --ink-faint:     #3D4046;

  --accent-rgb:    255, 179, 112;
  --accent:        rgb(var(--accent-rgb));
  --accent-soft:   rgba(var(--accent-rgb), 0.14);
  --accent-line:   rgba(var(--accent-rgb), 0.32);

  --status-sync:   #6BE39B;
  --status-edit:   #FFB370;
  --status-error:  #FF7A8A;

  --on-ink:        #0A0B0D;
  --sans: "Geist", "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --topbar-h: 48px;
  --sidebar-w: 220px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body { background: var(--canvas); color: var(--ink); font-family: var(--sans); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; }
button, a { font-family: inherit; }
a { color: inherit; text-decoration: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { display: none; }

/* ============================================================
   APP SHELL (rendered behind modal)
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas: "topbar topbar" "sidebar main";
  height: 100vh;
}
.topbar { grid-area: topbar; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; background: var(--surface); border-bottom: 1px solid var(--line); }
.tb-left { display: flex; align-items: center; gap: 8px; }
.brand { display: inline-flex; align-items: center; gap: 7px; font: 600 12.5px/1 var(--sans); color: var(--ink); }
.brand .glyph { width: 20px; height: 20px; border-radius: 5px; background: var(--ink); color: var(--on-ink); display: inline-flex; align-items: center; justify-content: center; font: 500 13px/1 var(--sans); padding-bottom: 1px; position: relative; }
.brand .glyph::after { content: ""; position: absolute; inset: 0; border-radius: inherit; background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent 50%); }
.tb-sep { width: 1px; height: 14px; background: var(--line-strong); }
.ws-switch { display: inline-flex; align-items: center; gap: 6px; padding: 3px 6px 3px 4px; border-radius: 5px; background: transparent; border: 1px solid transparent; cursor: pointer; color: var(--ink); font: 500 12px/1 var(--sans); }
.ws-avatar { width: 14px; height: 14px; border-radius: 4px; background: linear-gradient(135deg, #7C9CFF, #C8A2FF); color: white; font-weight: 700; font-size: 8.5px; display: inline-flex; align-items: center; justify-content: center; }
.crumbs { display: flex; align-items: center; gap: 8px; font: 500 13px/1 var(--sans); color: var(--ink-muted); flex: 1; justify-content: center; }
.crumbs .here { color: var(--ink); font-weight: 500; }
.crumbs .back-link { color: var(--ink-muted); }
.status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px 3px 7px; border-radius: 999px; font: 500 10.5px/1 var(--sans); }
.status-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.status-pill.published { background: rgba(107,227,155,0.10); border: 1px solid rgba(107,227,155,0.28); color: var(--status-sync); }
.tb-right { display: flex; align-items: center; gap: 4px; }
.user-chip { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, rgba(var(--accent-rgb),0.95), rgba(255,122,138,0.95)); color: var(--on-ink); font: 700 9.5px/1 var(--sans); display: inline-flex; align-items: center; justify-content: center; }
.icon-btn { width: 24px; height: 24px; border-radius: 4px; background: transparent; border: 0; color: var(--ink-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
.btn { font: 500 12.5px/1 var(--sans); padding: 7px 11px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
.btn-ink { background: var(--ink); color: var(--on-ink); }
.btn-secondary { background: var(--surface); color: var(--ink); border-color: var(--line-strong); }
.btn[disabled] { opacity: 0.55; cursor: not-allowed; }
.btn .soon { font: 500 9.5px/1 var(--mono); letter-spacing: 0.06em; padding: 2px 5px; border-radius: 3px; background: rgba(255,255,255,0.08); color: var(--ink-muted); margin-left: 4px; }

.sidebar { grid-area: sidebar; background: var(--surface); border-right: 1px solid var(--line); padding: 14px 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
.sb-section h6 { margin: 0 0 4px; padding: 0 8px; font: 500 10px/1 var(--mono); letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-muted); }
.sb-list { display: flex; flex-direction: column; gap: 1px; }
.sb-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 5px; cursor: pointer; color: var(--ink-soft); font: 500 12px/1 var(--sans); position: relative; }
.sb-item.active { background: var(--surface-2); color: var(--ink); }
.sb-item.active::before { content: ""; position: absolute; left: 0; top: 6px; bottom: 6px; width: 2px; background: var(--accent); border-radius: 2px; }
.sb-item .pill { font: 500 9.5px/1 var(--mono); padding: 2px 5px; border-radius: 3px; background: var(--surface-3); color: var(--ink-muted); letter-spacing: 0.04em; }
.sb-item .pill.acc { background: var(--accent-soft); color: var(--accent); }

.main { grid-area: main; position: relative; background: var(--sunken); overflow: hidden; }
.canvas-bg {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, var(--line-strong) 1px, transparent 1px);
  background-size: 16px 16px;
  background-position: 0 0;
}
.canvas-node-mini {
  position: absolute;
  width: 200px; height: 64px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font: 500 11px/1 var(--mono); color: var(--ink-muted);
  letter-spacing: 0.04em;
  opacity: 0.55;
}
.canvas-node-mini .ttl { font: 500 12px/1.3 var(--sans); color: var(--ink); margin-top: 6px; letter-spacing: 0; text-transform: none; }

/* ============================================================
   MODAL OVERLAY
   ============================================================ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(10,11,13,0.80);
  backdrop-filter: blur(8px) saturate(140%);
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
  animation: fadeIn 180ms ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  width: 100%; max-width: 768px; max-height: 85vh;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow:
    0 30px 80px -30px rgba(0,0,0,0.7),
    0 0 0 1px rgba(255,255,255,0.04),
    inset 0 1px 0 rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: pop 220ms cubic-bezier(0.16,1,0.3,1);
}
@keyframes pop {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* HEADER */
.m-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; height: 56px;
  border-bottom: 1px solid var(--line);
}
.m-head .left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.m-head .label {
  font: 500 10px/1 var(--mono);
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-muted);
}
.m-head .flow {
  font: 500 14px/1 var(--sans); color: var(--ink);
}
.m-head .step-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px 4px 8px;
  border-radius: 999px;
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  color: var(--accent);
  font: 500 11px/1 var(--mono); letter-spacing: 0.02em;
}
.m-head .step-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.m-close {
  width: 28px; height: 28px; border-radius: 6px;
  background: transparent; border: 0;
  color: var(--ink-muted); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
.m-close:hover { background: var(--surface-2); color: var(--ink); }

/* PROGRESS STRIP */
.progress {
  display: flex; gap: 4px; padding: 8px 22px 0;
}
.progress .seg {
  flex: 1; height: 2px; border-radius: 2px;
  background: var(--surface-2);
}
.progress .seg.done { background: var(--accent); }
.progress .seg.current { background: var(--accent); }
.progress .seg.upcoming { background: var(--surface-2); }

/* BODY */
.m-body {
  flex: 1; overflow-y: auto;
  padding: 22px 26px 24px;
}
.step-eyebrow {
  display: flex; align-items: center; gap: 9px;
  font: 500 10.5px/1 var(--mono);
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
}
.step-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; }
.step-eyebrow .kind-doc { background: var(--ink-soft); }
.step-eyebrow .kind-docs { background: var(--ink-soft); }
.step-eyebrow .kind-instruction { background: var(--ink-faint); }
.step-eyebrow .kind-decision { background: var(--status-edit); }

.step-title {
  font: 500 18px/1.3 var(--sans);
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0 0 18px;
}

.sec-label {
  font: 500 10.5px/1 var(--mono);
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-muted);
  margin: 0 0 8px;
  display: flex; align-items: center; gap: 8px;
}

.instr-callout {
  background: var(--sunken);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 20px;
}
.instr-callout .label {
  font: 500 10.5px/1 var(--mono);
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.instr-callout p {
  margin: 0;
  font: italic 400 13.5px/1.6 var(--sans);
  color: var(--ink);
}

.content-block {
  font: 400 13.5px/1.65 var(--sans);
  color: var(--ink-soft);
  white-space: pre-wrap;
}
.content-block p { margin: 0 0 12px; }
.content-block p:last-child { margin: 0; }
.content-block h4 {
  font: 500 14px/1.4 var(--sans);
  color: var(--ink);
  margin: 14px 0 8px;
}
.content-block code {
  font: 500 12px/1 var(--mono);
  padding: 1px 6px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--ink);
}
.attribution {
  margin-top: 14px;
  font: 500 11px/1 var(--mono);
  color: var(--ink-faint);
  letter-spacing: 0.02em;
}
.attribution .source { color: var(--ink-muted); }

/* STATE VIEWS */
.state-view {
  display: none;
  flex-direction: column; align-items: center;
  text-align: center;
  padding: 56px 24px;
  color: var(--ink-muted);
  font-size: 13px;
}
.state-view.active { display: flex; }
.state-view .spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--line-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-view.error { color: var(--status-error); }
.state-view.error .detail {
  margin-top: 8px;
  font: 500 11px/1.4 var(--mono);
  color: var(--ink-muted);
  background: var(--sunken);
  border: 1px solid rgba(255,122,138,0.22);
  border-radius: 6px;
  padding: 8px 12px;
  max-width: 360px;
  letter-spacing: 0.02em;
}

/* FOOTER */
.m-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; height: 56px;
  border-top: 1px solid var(--line);
  background: var(--surface);
}
.m-foot .nav { display: flex; gap: 8px; }
.foot-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 6px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  color: var(--ink); cursor: pointer;
  font: 500 12.5px/1 var(--sans);
}
.foot-btn:hover:not([disabled]) { background: var(--surface-3); border-color: var(--line-strong); }
.foot-btn[disabled] { opacity: 0.4; cursor: not-allowed; }
.foot-btn.ghost { background: transparent; border-color: transparent; color: var(--ink-soft); }
.foot-btn.ghost:hover:not([disabled]) { background: var(--surface-2); color: var(--ink); }
.foot-btn.copied {
  background: rgba(107,227,155,0.10);
  border-color: rgba(107,227,155,0.30);
  color: var(--status-sync);
}

.kbd-hint {
  font: 500 10px/1 var(--mono);
  letter-spacing: 0.04em;
  color: var(--ink-faint);
  display: inline-flex; align-items: center; gap: 6px;
  margin-right: 12px;
}
.kbd-hint kbd {
  padding: 2px 5px; border-radius: 3px;
  background: var(--surface-2); border: 1px solid var(--line);
  color: var(--ink-muted); font: 500 9.5px/1 var(--mono);
}
</style>
</head>
<body>

<!-- Background app shell (dimmed under modal) -->
<div class="app" aria-hidden="true">
  <header class="topbar">
    <div class="tb-left">
      <a class="brand"><span class="glyph">μ</span><span>Mnema</span></a>
      <span class="tb-sep"></span>
      <button class="ws-switch"><span class="ws-avatar">B</span><span>boppl-design</span><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg></button>
    </div>
    <div class="crumbs">
      <a class="back-link">Flows</a>
      <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--ink-faint);"><path d="m9 6 6 6-6 6"/></svg>
      <span class="here">New-hire onboarding</span>
      <span class="status-pill published" style="margin-left:6px;"><span class="dot"></span>Published</span>
    </div>
    <div class="tb-right">
      <button class="btn btn-secondary"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Walk this flow</button>
      <button class="btn btn-ink" disabled><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>Edit<span class="soon">SOON</span></button>
      <span class="tb-sep" style="margin:0 4px;"></span>
      <button class="icon-btn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
      <button class="user-chip">K</button>
    </div>
  </header>
  <aside class="sidebar">
    <div class="sb-section">
      <h6>Workspace</h6>
      <div class="sb-list">
        <div class="sb-item"><span>Knowledge</span><span class="pill">42</span></div>
        <div class="sb-item active"><span>Flows</span><span class="pill acc">3</span></div>
        <div class="sb-item"><span>Claude chats</span></div>
      </div>
    </div>
  </aside>
  <main class="main">
    <div class="canvas-bg"></div>
    <div class="canvas-node-mini" style="left:120px;top:80px;">DOC · STEP 01<div class="ttl">Welcome &amp; tone</div></div>
    <div class="canvas-node-mini" style="left:120px;top:200px;">DOCS · STEP 02<div class="ttl">Product overview</div></div>
    <div class="canvas-node-mini" style="left:120px;top:320px;">DECISION · STEP 03<div class="ttl">Has eng access?</div></div>
    <div class="canvas-node-mini" style="left:380px;top:440px;">DOC · STEP 04<div class="ttl">Eng setup guide</div></div>
  </main>
</div>

<!-- MODAL OVERLAY -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="walk-title">
  <div class="modal">

    <!-- HEADER -->
    <header class="m-head">
      <div class="left">
        <span class="label">WALK THIS FLOW</span>
        <span class="flow" id="walk-title">New-hire onboarding</span>
        <span class="step-pill"><span class="dot"></span>Step <span id="step-n">2</span> of <span id="step-m">5</span></span>
      </div>
      <button class="m-close" id="m-close" title="Close · Esc">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </header>

    <!-- PROGRESS -->
    <div class="progress" id="progress"></div>

    <!-- BODY -->
    <div class="m-body" id="m-body">
      <!-- step content rendered into here -->
    </div>

    <!-- FOOTER -->
    <footer class="m-foot">
      <div class="nav">
        <button class="foot-btn" id="prev" disabled>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>
          Previous
        </button>
        <button class="foot-btn" id="next">
          Next
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div style="display:flex;align-items:center;">
        <span class="kbd-hint"><kbd>←</kbd><kbd>→</kbd> step · <kbd>Esc</kbd> close</span>
        <button class="foot-btn ghost" id="copy">
          <svg id="copy-ic" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span id="copy-label">Copy step</span>
        </button>
      </div>
    </footer>

  </div>
</div>

<script>
const STEPS = [
  {
    kind: "DOC",
    title: "Welcome & tone",
    instruction: "Adopt this tone for the rest of the conversation — friendly, precise, never marketing. Use it when greeting the new hire and when explaining concepts.",
    content: `Mnema is a live context engine. We sound human, direct, and quietly confident.\n\nWe never say things like "amazing," "blazingly fast," or "powerful." Instead we describe exactly what something does and let it speak for itself.\n\nWhen unsure, prefer fewer words.`,
    source: "Brand voice"
  },
  {
    kind: "DOCS",
    title: "Product overview",
    instruction: "Understand the live-context model before answering anything specific. Don't reference the architecture pages directly unless the user asks for implementation detail.",
    content: `Mnema is an MCP server that exposes a workspace of live docs to AI agents.\n\nThree primitives:\n  • Docs — markdown editable in real time via Yjs.\n  • Folders — hierarchical organisation.\n  • Flows — sequenced reading orders Claude follows step by step.\n\nClaude reads through three tools: get_doc, search_workspace, and list_folders. All reads return the workspace as it exists right now — no snapshot, no upload step.`,
    source: "Architecture / 3 docs"
  },
  {
    kind: "DECISION",
    title: "Has eng access?",
    instruction: "If the user works in engineering, route them through the technical setup steps. Otherwise, skip to the team-contacts step.",
    content: `Condition\n  if user.role === "engineering"\n\nBranches\n  yes  →  Step 04 · Eng setup guide\n  no   →  Step 06 · Team contacts`,
    source: "Decision · branching ships in 6.4"
  },
  {
    kind: "DOC",
    title: "Eng setup guide",
    instruction: "Walk the user through cloning, env vars, and the test suite. Don't dump it all at once — wait for them to confirm each step.",
    content: `Clone the repo:\n  git clone git@github.com:boppl/mnema.git\n\nInstall:\n  pnpm install\n\nEnv vars to set in .env.local:\n  • MNEMA_WORKSPACE_KEY (ask in #eng-onboarding)\n  • POSTGRES_URL\n  • REDIS_URL\n\nRun the test suite:\n  pnpm test --watch`,
    source: "Local dev setup"
  },
  {
    kind: "INSTRUCTION",
    title: "Wrap-up reminder",
    instruction: null,
    content: `End every onboarding session by offering to introduce the new hire to a teammate. Pick someone based on their role:\n\n  • Engineering  → Maya or Anton\n  • Design       → Priya\n  • Product      → Kevin\n\nProvide a calendar link if they want to schedule it.`,
    source: null
  }
];

let idx = 1; // start on step 2 (index 1), matching the design

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function renderContent(text) {
  // Render as a simple <p> per blank-line block, with inline code support
  return text.split(/\n\n+/).map(block => {
    const html = escapeHtml(block).replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\n/g, '<br/>');
    return `<p>${html}</p>`;
  }).join('');
}

function render() {
  const step = STEPS[idx];
  document.getElementById('step-n').textContent = idx + 1;
  document.getElementById('step-m').textContent = STEPS.length;
  document.getElementById('prev').disabled = (idx === 0);
  document.getElementById('next').disabled = (idx === STEPS.length - 1);

  const kindClass = 'kind-' + step.kind.toLowerCase();
  const body = document.getElementById('m-body');
  body.innerHTML = `
    <div class="step-eyebrow"><span class="dot ${kindClass}"></span>STEP ${String(idx+1).padStart(2,'0')} · ${step.kind}</div>
    <h2 class="step-title">${escapeHtml(step.title)}</h2>
    ${step.instruction ? `
      <div class="instr-callout">
        <div class="label">INSTRUCTION (READ FIRST)</div>
        <p>${escapeHtml(step.instruction)}</p>
      </div>
    ` : ''}
    ${step.content ? `
      <div class="sec-label">CONTENT</div>
      <div class="content-block">${renderContent(step.content)}</div>
      ${step.source ? `<div class="attribution">source: <span class="source">${escapeHtml(step.source)}</span></div>` : ''}
    ` : ''}
  `;

  // progress strip
  const progress = document.getElementById('progress');
  progress.innerHTML = STEPS.map((_, i) => {
    let cls = 'upcoming';
    if (i < idx) cls = 'done';
    else if (i === idx) cls = 'current';
    return `<span class="seg ${cls}"></span>`;
  }).join('');

  // reset scroll
  body.scrollTop = 0;
  // reset copy button state
  const copyBtn = document.getElementById('copy');
  copyBtn.classList.remove('copied');
  document.getElementById('copy-label').textContent = 'Copy step';
  document.getElementById('copy-ic').outerHTML = '<svg id="copy-ic" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
}

document.getElementById('prev').addEventListener('click', () => { if (idx > 0) { idx--; render(); } });
document.getElementById('next').addEventListener('click', () => { if (idx < STEPS.length - 1) { idx++; render(); } });
document.getElementById('m-close').addEventListener('click', () => closeModal());

document.getElementById('copy').addEventListener('click', () => {
  const step = STEPS[idx];
  const text = `STEP ${idx+1} · ${step.kind} — ${step.title}\n\n${step.instruction ? 'INSTRUCTION:\n' + step.instruction + '\n\n' : ''}${step.content ? step.content : ''}${step.source ? '\n\nsource: ' + step.source : ''}`;
  try { navigator.clipboard.writeText(text); } catch(e) {}

  const btn = document.getElementById('copy');
  btn.classList.add('copied');
  document.getElementById('copy-ic').outerHTML = '<svg id="copy-ic" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
  document.getElementById('copy-label').textContent = 'Copied';
  setTimeout(() => {
    btn.classList.remove('copied');
    document.getElementById('copy-ic').outerHTML = '<svg id="copy-ic" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    document.getElementById('copy-label').textContent = 'Copy step';
  }, 1500);
});

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
}

// keyboard
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowRight' && idx < STEPS.length - 1) { idx++; render(); }
  if (e.key === 'ArrowLeft' && idx > 0) { idx--; render(); }
});

render();
</script>
</body>
</html>
