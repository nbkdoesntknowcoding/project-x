# docker-compose.meeting.yml — Mnema Meeting Bot stack (Recall.ai front end).
#
# Recall joins the meeting and streams mixed audio to pipecat-meeting over a PUBLIC
# WebSocket (Caddy: meet-ws.theboringpeople.in → pipecat-meeting:8765). pipecat runs
# Deepgram → GPT-4o-mini (+ Mnema tools) → ElevenLabs and (talking) plays the reply
# back via Recall Output Media. meeting-bot is just the Recall REST controller.
#
# Secrets come from infra/.env via env_file (same as the core api service).
# Deploy:  docker compose -f docker-compose.meeting.yml up -d --build
services:
  pipecat-meeting:
    build: ./pipecat-meeting
    restart: unless-stopped
    env_file:
      - infra/.env            # OPENAI/DEEPGRAM/ELEVENLABS/RECALL_*/MEETING_WS_SECRET
    ports:
      - "127.0.0.1:8765:8765" # local health; public access is via Caddy
    networks:
      - internal              # so Caddy (infra stack) can reach it by service name

  meeting-bot:
    build: ./meeting-bot
    restart: unless-stopped
    env_file:
      - infra/.env            # RECALL_API_KEY, RECALL_REGION, RECALL_AUDIO_WSS, MNEMA_*
    ports:
      - "127.0.0.1:3001:3001" # /join control endpoint (internal only)
    depends_on:
      - pipecat-meeting

# Reuse the core stack's Caddy network so meet-ws.theboringpeople.in can reverse_proxy
# to pipecat-meeting. NOTE: confirm the actual network name on the VPS with
# `docker network ls | grep internal` and set it here (compose prefixes it with the
# core stack's project name, e.g. mnema_internal or infra_internal).
networks:
  internal:
    external: true
    name: mnema_internal
