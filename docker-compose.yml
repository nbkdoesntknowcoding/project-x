services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: boppl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: boppl
      POSTGRES_PASSWORD: boppl_dev_pw_change_me
      POSTGRES_DB: boppl_context
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boppl -d boppl_context"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: boppl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
